[package]
name = "branchdiff"
version = "0.1.0"
edition = "2021"
description = "Terminal UI showing unified diff of current branch vs main/master"
license = "MIT"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
notify = "7"
notify-debouncer-mini = "0.5"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
similar = { version = "2", features = ["inline"] }
arboard = "2"

[dev-dependencies]
tempfile = "3"
insta = "1"
proptest = "1.5"
assert_cmd = "2"
predicates = "3"
